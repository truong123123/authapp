spring:
  application:
    name: authapp

  # Default profile: H2 in-memory database
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 570583732772-895ftopthdla005pbjpdsj0c3mo8m5n8.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:facebook-client-id-placeholder}
            client-secret: ${FACEBOOK_CLIENT_SECRET:facebook-client-secret-placeholder}
            scope:
              - email
              - public_profile
            fields:
              - id
              - name
              - email

app:
  jwt:
    secret: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc=
    expirationMs: 3600000
    refreshExpirationMs: 604800000
  oauth2:
    authorizedRedirectUris: http://localhost:5000/oauth2/redirect,http://localhost:3000/oauth2/redirect,http://localhost:8080/swagger-ui.html

server:
  port: 8080

---
# PostgreSQL profile: activate with --spring.profiles.active=postgresql
spring:
  config:
    activate:
      on-profile: postgresql

  datasource:
    url: jdbc:postgresql://localhost:5432/truongng
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 879779

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
